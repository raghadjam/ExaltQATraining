<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Registration System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        form {
            background-color: #fff;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
        }
        input[type="text"], input[type="button"] {
            padding: 8px;
            margin-bottom: 10px;
            width: 200px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="button"] {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        input[type="button"]:hover {
            background-color: #45a049;
        }
        pre {
            background-color: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Civil Registration System</h1>

    <form>
        <input type="button" id="getAll" value="Get All Civils" onclick="getCivil('all')">
    </form>

    <form>
        <input type="text" name="civilsID" id="civilsID" placeholder="Enter Civil ID">
        <input type="button" name="civil" id="civil" onclick="getCivil(document.getElementById('civilsID').value)" value="Get Civil Information">
    </form>

    <form>
        <label for="CivilID">Please enter civil ID </label>
        <input type="text" name="CivilID" id="CivilID" onchange="getID()">
        <input type="button" name="editCivilBt" id="editCivilBt" value="Edit Civil" onclick="editCivilGetData(document.getElementById('CivilID').value)">
        <input type="button" name="addCivilBt" id="addCivilBt" value="Add Civil" onclick="addCivilButton()">
        <input type="button" name="deleteCivilBt" id="deleteCivilBt" value="Delete Civil" onclick="deleteCivil()">
    </form>

    <form>
        <label for="FirstName">First Name</label>
        <input type="text" name="FirstName" id="FirstName">
        <label for="LastName">Last Name</label>
        <input type="text" name="LastName" id="LastName">
        <label for="ID">ID</label>
        <input type="text" name="ID" id="ID" disabled>
        <label for="Age">Age</label>
        <input type="text" name="Age" id="Age">
        <label for="Mobile">Mobile Number</label>
        <input type="text" name="Mobile" id="Mobile">
        <input type="button" name="Done" id="Done" value="Add" onclick="addCivil()">
    </form>

    <pre>
        <p id="civilInfo"></p>
    </pre>

    <script>
        async function getCivil (id) {
        let response = await fetch("http://localhost:3000/get/"+id, {
        method: 'GET',

        });
        if(response.status === 404) {
        document.getElementById("civilInfo").innerHTML = "Could not find civil with ID : "+id
        return Promise.reject('error 404')
        }
        var data = await response.json();
        document.getElementById("civilInfo").innerHTML = '\n'
        if(id=='all')
        for(var i=0;i<data.length;i++)
        document.getElementById("civilInfo").innerHTML += "First Name:\t"+data[i].FirstName+"\n"+"Last Name:\t"+data[i].LastName+"\n"+"ID:\t\t"+data[i].ID+"\n"+"Age:\t\t"+data[i].Age+"\n"+"Mobile Number:\t"+data[i].Mobile+'\n\n'
        else
        document.getElementById("civilInfo").innerHTML += "First Name:\t"+data.FirstName+"\n"+"Last Name:\t"+data.LastName+"\n"+"ID:\t\t"+data.ID+"\n"+"Age:\t\t"+data.Age+"\n"+"Mobile Number:\t"+data.Mobile+'\n\n'
        }
    </script>
    <script>
        function addCivilButton(){
        document.getElementById('Done').value = 'Add'
        document.getElementById("FirstName").value = ''
        document.getElementById("LastName").value = ''
        document.getElementById("ID").value = document.getElementById('CivilID').value
        document.getElementById("Age").value = ''
        document.getElementById("Mobile").value = ''
        document.getElementById("civilInfo").innerHTML = ''
        }
    </script>
    <script>
        async function editCivilGetData (id) {
        document.getElementById('Done').value = 'Save'
        document.getElementById("civilInfo").innerHTML = ''
        let response = await fetch("http://localhost:3000/get/"+id, {
        method: 'GET',
        });
        if(response.status === 404) {
        document.getElementById("civilInfo").innerHTML = "Could not find civil with ID : "+id
        document.getElementById("FirstName").value = ''
        document.getElementById("LastName").value = ''
        document.getElementById("ID").value = ''
        document.getElementById("Age").value = ''
        document.getElementById("Mobile").value = ''
        return Promise.reject('error 404')
        }
        var data = await response.json();
        document.getElementById("FirstName").value = data.FirstName
        document.getElementById("LastName").value = data.LastName
        document.getElementById("ID").value = data.ID
        document.getElementById("Age").value = data.Age
        document.getElementById("Mobile").value = data.Mobile
        }
    </script>
    <script>
        async function addCivil(){
        var data = {
        FirstName: document.getElementById("FirstName").value,
        LastName: document.getElementById("LastName").value,
        ID: document.getElementById("ID").value,
        Age: document.getElementById("Age").value,
        Mobile: document.getElementById("Mobile").value};
        if(document.getElementById('Done').value == 'Save'){
        let response = await fetch("http://localhost:3000/edit/", {
        method: 'PUT',
        headers: {
        'Content-Type': 'application/json',
        },
        body: JSON.stringify(data),
        });
        if(response.status === 404)
        document.getElementById("civilInfo").innerHTML = "Could not find civil with ID : "+document.getElementById('ID').value
        else if(response.status == 400){
        document.getElementById("civilInfo").innerHTML = "Invalid Request"
        }
        else
        document.getElementById("civilInfo").innerHTML = "Civil has been edited successfully"
        }
        else {
        let response = await fetch("http://localhost:3000/add/", {
        method: 'POST',
        headers: {
        'Content-Type': 'application/json',
        },
        body: JSON.stringify(data),
        });
        if(response.status === 404)
        document.getElementById("civilInfo").innerHTML = "Failed to add used with ID : "+document.getElementById('ID').value
        else if(response.status == 400){
        document.getElementById("civilInfo").innerHTML = "Invalid Request"
        }
        else
        document.getElementById("civilInfo").innerHTML = "Civil has been added successfully"
        }
        }
    </script>
    <script>
        async function deleteCivil(){
        let response = await fetch("http://localhost:3000/delete/"+document.getElementById('CivilID').value,{
            method: 'DELETE',
        });
        if(response.status === 404){
        document.getElementById("civilInfo").innerHTML = "Could not find civil with ID : "+document.getElementById('ID').value
        }
        else {
        document.getElementById("civilInfo").innerHTML = "Civil has been deleted successfully"
        }
        }
    </script>
    <script>
        function getID(){
            document.getElementById('ID').value = document.getElementById('CivilID').value
        }
    </script>
</body>
</html>
