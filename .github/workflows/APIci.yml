name: API Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repo
      - uses: actions/checkout@v4

      # 2. Set up Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'   

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
        working-directory: ./Assignment-8/Dental\ Booking\ System\ API

      # 4. Run the tests
      - name: Run API tests
        run: python -m pytest -v -s
        working-directory: ./Assignment-8/Dental\ Booking\ System\ API
