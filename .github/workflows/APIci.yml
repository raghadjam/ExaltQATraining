name: API Tests

# on:
#   push:
#     branches: [ "main" ]
#   pull_request:
#     branches: [ "main" ]

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests
        working-directory: "./DentalBooking_UI_API_Py/Dental Booking System API"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node.js dependencies
        run: | 
          npm install
          npm install express
        working-directory: "./DentalBooking_UI_API_Py/Dental Booking System API"

      - name: Run API tests
        run: npm run test-api
        working-directory: "./DentalBooking_UI_API_Py/Dental Booking System API"
