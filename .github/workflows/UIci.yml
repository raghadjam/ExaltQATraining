name: UI Tests


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-ui-tests:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests selenium
        working-directory: "./Assignment-8/Dental Booking System UI"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node.js dependencies
        run: npm install
        working-directory: "./Assignment-8/Dental Booking System UI"

      - name: Run UI tests
        run: npm run test-ui
        working-directory: "./Assignment-8/Dental Booking System UI"
